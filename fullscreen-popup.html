<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        h1 { font-size: 5rem; margin-bottom: 1rem; }
        .timer { font-size: 8rem; font-weight: bold; margin-bottom: 2rem; }
        .message { font-size: 1.5rem; opacity: 0.9; margin-bottom: 3rem; }
        .btn {
            padding: 1rem 3rem;
            font-size: 1.5rem;
            background: white;
            color: #2575fc;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            display: none; /* Hidden by default */
        }
        .btn:hover { background: #f0f0f0; transform: scale(1.05); }
    </style>
</head>
<body>
    <h1 id="title">Break Time</h1>
    <div class="timer" id="timer">00:00</div>
    <div class="message" id="message">Take a moment to relax and stretch.</div>
    <button class="btn" id="next-btn">Next Phase ➤</button>

    <script src="fullscreen-popup.js"></script>
</body>
</html>
