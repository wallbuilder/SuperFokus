<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Break Time</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            overflow: hidden;
        }
        h1 { font-size: 5rem; margin-bottom: 2rem; }
        #timer { font-size: 8rem; font-weight: bold; }
        p { font-size: 2rem; opacity: 0.8; }
    </style>
</head>
<body>
    <h1 id="break-type">Short Break</h1>
    <div id="timer">00:00</div>
    <p>Step away from the screen and relax.</p>
    <script src="fullscreen-popup.js"></script>
</body>
</html>
