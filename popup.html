<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reminder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f9;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }
        body.blocking {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        h2 { 
            color: #2c3e50; 
            margin-top: 0;
            font-size: 2.5rem;
        }
        body.blocking h2 {
            color: white;
            font-size: 3rem;
        }
        p { 
            font-size: 1.2rem; 
            color: #333; 
        }
        body.blocking p {
            color: white;
            font-size: 1.5rem;
        }
        .close-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            min-width: 120px;
        }
        body.blocking .close-btn {
            padding: 12px 30px;
            background-color: rgba(255, 255, 255, 0.2);
            font-size: 1.2rem;
        }
        .close-btn:hover:not(:disabled) {
            background-color: #a8b8c8;
            color: #2c3e50;
            transform: translateY(-1px);
        }
        .close-btn .hover-text {
            display: none;
        }
        .close-btn:hover:not(:disabled) .default-text {
            display: none;
        }
        .close-btn:hover:not(:disabled) .hover-text {
            display: inline;
        }
        body.blocking .close-btn:hover:not(:disabled) {
            background-color: rgba(255, 255, 255, 0.4);
            color: white;
            transform: translateY(-1px);
        }
        .close-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
        }
    </style>
</head>
<body>
    <h2 id="message-title">Fokus Reminder</h2>
    <p id="message-content">Loading...</p>
    <button id="close-btn" class="close-btn">
        <span class="default-text">Closes in (<span id="timer">10</span>)</span>
        <span class="hover-text">Close now</span>
    </button>
    <script src="popup.js"></script>
</body>
</html>
