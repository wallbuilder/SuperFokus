<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reminder</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f9;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }
        h2 { color: #2c3e50; margin-top: 0; }
        p { font-size: 1.2rem; color: #333; }
        .close-btn {
            margin-top: 15px;
            padding: 8px 20px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2 id="message-title">Fokus Reminder</h2>
    <p id="message-content">Loading...</p>
    <button class="close-btn" onclick="window.close()">Close</button>
    <script src="popup.js"></script>
</body>
</html>
