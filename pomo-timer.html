<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pomo Timer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            overflow: hidden;
            padding: 10px;
        }
        #phase { font-size: 0.9rem; margin-bottom: 5px; opacity: 0.8; }
        #timer { font-size: 2rem; font-weight: bold; margin-bottom: 10px; }
        .progress-container {
            width: 100%;
            height: 10px;
            background-color: #34495e;
            border-radius: 5px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            width: 100%;
            background-color: #27ae60;
            transition: width 1s linear;
        }
    </style>
</head>
<body>
    <div id="phase">Work Session</div>
    <div id="timer">00:00</div>
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    <script src="pomo-timer.js"></script>
</body>
</html>
