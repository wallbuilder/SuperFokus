<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 1rem;
            background: #ffffff;
            color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            border-top: 5px solid #6a11cb;
        }
        #phase { font-size: 1.2rem; font-weight: 500; margin-bottom: 0.5rem; color: #6a11cb; }
        #timer { font-size: 3.5rem; font-weight: bold; margin-bottom: 1rem; }
        .progress-container {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 6px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
            transition: width 0.5s linear;
        }
    </style>
</head>
<body>
    <div id="phase">Work Session</div>
    <div id="timer">00:00</div>
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    <script src="pomo-timer.js"></script>
</body>
</html>
