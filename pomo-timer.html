<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 1rem;
            background: #ffffff;
            color: #2c3e50;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            border-top: 5px solid #6a11cb;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        body.dark-mode {
            background: #1e1e1e;
            color: #e0e0e0;
            border-top: 5px solid #bb86fc;
        }
        #phase { font-size: 1.2rem; font-weight: 500; margin-bottom: 0.5rem; color: #6a11cb; transition: color 0.3s; }
        body.dark-mode #phase { color: #bb86fc; }
        #timer { font-size: 3.5rem; font-weight: bold; margin-bottom: 1rem; transition: opacity 0.3s, color 0.3s; }
        #timer.paused { opacity: 0.6; color: #999; }
        body.dark-mode #timer.paused { color: #666; }
        .progress-container {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 6px;
            overflow: hidden;
            transition: background 0.3s;
        }
        body.dark-mode .progress-container { background: #333; }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
            transition: width 0.5s linear;
        }
    </style>
</head>
<body>
    <div id="phase">Work Session</div>
    <div id="timer">00:00</div>
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    <script src="pomo-timer.js"></script>
</body>
</html>
