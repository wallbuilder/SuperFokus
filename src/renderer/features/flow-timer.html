<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 1rem;
            background: #ffffff;
            color: #2c3e50;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            border-top: 5px solid #27ae60;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        body.dark-mode {
            background: #16213e;
            color: #e0e0e0;
            border-top: 5px solid #2ecc71;
        }
        #phase { font-size: 1.2rem; font-weight: 500; margin-bottom: 0.5rem; color: #27ae60; transition: color 0.3s; }
        body.dark-mode #phase { color: #2ecc71; }
        #timer { font-size: 3.5rem; font-weight: bold; margin-bottom: 1rem; transition: opacity 0.3s, color 0.3s; }
    </style>
</head>
<body>
    <div id="phase">Flow State</div>
    <div id="timer">00:00:00</div>
    <script type="module" src="./flow-timer-window.js"></script>
</body>
</html>
