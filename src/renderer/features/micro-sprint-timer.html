<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 1rem;
            background: #ffffff;
            color: #2c3e50;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            border-top: 5px solid #3498db;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        body.dark-mode {
            background: #16213e;
            color: #e0e0e0;
            border-top: 5px solid #3498db;
        }
        #task { font-size: 1.2rem; font-weight: 500; margin-bottom: 0.5rem; color: #3498db; transition: color 0.3s; text-align: center; }
        body.dark-mode #task { color: #3498db; }
        #timer { font-size: 3.5rem; font-weight: bold; margin-bottom: 1rem; transition: opacity 0.3s, color 0.3s; }
        #timer.paused { opacity: 0.6; color: #999; }
        body.dark-mode #timer.paused { color: #666; }
        .progress-container {
            width: 100%;
            height: 14px;
            background: #eee;
            border-radius: 7px;
            overflow: hidden;
            transition: background 0.3s;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }
        body.dark-mode .progress-container { background: #333; }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3498db 0%, #2980b9 100%);
            transition: width 0.5s linear;
        }
        #tasks-left { font-size: 0.9rem; color: #7f8c8d; margin-top: 0.2rem; }
        body.dark-mode #tasks-left { color: #a4b0be; }
    </style>
</head>
<body>
    <div id="task">Sprint Task</div>
    <div id="timer">00:00</div>
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    <div id="tasks-left">Remaining Tasks: 0</div>
    <script type="module" src="./micro-sprint-timer-window.js"></script>
</body>
</html>
