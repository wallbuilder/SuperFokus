<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, var(--header-grad-1, #6a11cb) 0%, var(--header-grad-2, #2575fc) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--header-title-color, white);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            transition: background 0.4s ease;
        }
        h1 { font-size: 5rem; margin-bottom: 1rem; color: var(--header-title-color, white); }
        .timer { font-size: 8rem; font-weight: bold; margin-bottom: 2rem; }
        .message { font-size: 1.5rem; opacity: 0.9; margin-bottom: 3rem; }
        .btn {
            padding: 1rem 3rem;
            font-size: 1.5rem;
            background: var(--header-title-color, white);
            color: var(--header-grad-2, #2575fc);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            display: none; /* Hidden by default */
        }
        .btn:hover { opacity: 0.9; transform: scale(1.05); }

        /* Dark mode fallback if needed */
        body.dark-mode {
            --header-grad-1: #0f3460;
            --header-grad-2: #e94560;
            --header-title-color: #f1f2f6;
        }
    </style>
</head>
<body>
    <h1 id="title">Break Time</h1>
    <div class="timer" id="timer">00:00</div>
    <div class="message" id="message">Take a moment to relax and stretch.</div>
    <button class="btn" id="next-btn">Next Phase ➤</button>

    <script type="module" src="./fullscreen-popup.js"></script>
</body>
</html>
