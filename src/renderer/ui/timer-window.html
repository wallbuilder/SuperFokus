<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 1rem;
            background: #ffffff;
            color: #2c3e50;
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            border-top: 5px solid var(--theme-color, #6a11cb);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        body.dark-mode {
            background: #16213e;
            color: #e0e0e0;
        }
        body.cyber-green-mode {
            background: #000000 !important;
            color: #00ff66 !important;
            border-top: 5px solid #00ff66 !important;
        }
        body.cyber-green-mode #label {
            color: #00ff66 !important;
        }
        body.cyber-green-mode #timer {
            color: #00ff66 !important;
        }
        body.cyber-green-mode .progress-container {
            background: #111 !important;
            border: 1px solid #00ff66 !important;
        }
        body.cyber-green-mode #progress-bar {
            background: #00ff66 !important;
        }
        body.cyber-green-mode #extra-info {
            color: #00cc55 !important;
        }
        #label { font-size: 1.2rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--theme-color, #6a11cb); transition: color 0.3s; text-align: center; }
        #timer { font-size: 3.5rem; font-weight: bold; margin-bottom: 1rem; transition: opacity 0.3s, color 0.3s; }
        #timer.paused { opacity: 0.6; color: #999; }
        body.dark-mode #timer.paused { color: #666; }
        .progress-container {
            width: 100%;
            height: 14px;
            background: #eee;
            border-radius: 7px;
            overflow: hidden;
            transition: background 0.3s;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            display: none; /* Shown based on type */
        }
        body.dark-mode .progress-container { background: #333; }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--theme-color, #6a11cb) 0%, var(--theme-color-2, #2575fc) 100%);
            transition: width 0.5s linear;
        }
        #extra-info { font-size: 0.9rem; color: #7f8c8d; margin-top: 0.2rem; display: none; }
        body.dark-mode #extra-info { color: #a4b0be; }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 0.8rem;
        }
        .control-btn {
            background: var(--theme-color, #6a11cb);
            color: #ffffff;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            font-size: 1rem;
        }
        .control-btn:hover {
            background: var(--theme-color-2, #2575fc);
            transform: scale(1.05);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }
        .control-btn:active {
            transform: scale(0.95);
        }
        body.cyber-green-mode .control-btn {
            background: #000000 !important;
            color: #00ff66 !important;
            border: 1px solid #00ff66 !important;
            box-shadow: 0 0 5px #00ff66;
        }
        body.cyber-green-mode .control-btn:hover {
            background: #00ff66 !important;
            color: #000000 !important;
            box-shadow: 0 0 10px #00ff66;
        }
    </style>
</head>
<body>
    <div id="label">Timer</div>
    <div id="timer">00:00</div>
    <div class="progress-container" id="progress-container">
        <div id="progress-bar"></div>
    </div>
    <div id="extra-info"></div>
    <div class="controls">
        <button id="play-pause-btn" class="control-btn" title="Pause">▐▐</button>
    </div>
    <script type="module" src="./timer-window.js"></script>
</body>
</html>
