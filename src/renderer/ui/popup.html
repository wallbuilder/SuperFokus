<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reminder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad-1: #f5f7fa;
            --bg-grad-2: #c3cfe2;
            --text-color: #4a4a4a;
            --header-grad-1: #6a11cb;
            --header-grad-2: #2575fc;
            --container-bg: rgba(255, 255, 255, 0.9);
            --heading-color: #2c3e50;
            --border-color: #eee;
            --timer-bg: #f8f9fa;
        }

        body.dark-mode {
            --bg-grad-1: #1a1a2e;
            --bg-grad-2: #16213e;
            --text-color: #e0e0e0;
            --header-grad-1: #0f3460;
            --header-grad-2: #e94560;
            --container-bg: #1a1a2e;
            --heading-color: #f1f2f6;
            --border-color: #2c3e50;
            --timer-bg: #16213e;
        }

        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
            color: var(--text-color);
            text-align: center;
            padding: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        body.blocking {
            background: linear-gradient(135deg, var(--header-grad-1) 0%, var(--header-grad-2) 100%);
            color: white;
        }

        .popup-container {
            background: var(--container-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--border-color);
            transition: all 0.4s ease;
        }

        body.blocking .popup-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            color: white;
        }

        h2 { 
            color: var(--heading-color); 
            margin-top: 0;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        body.blocking h2 {
            color: white;
            font-size: 2.2rem;
        }

        p { 
            font-size: 1.1rem; 
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .close-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, var(--header-grad-1) 0%, var(--header-grad-2) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            font-weight: 500;
            min-width: 160px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .close-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            filter: brightness(1.1);
        }

        .close-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .close-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
            background: #9e9e9e !important;
            box-shadow: none;
        }

        #popup-countdown {
            position: absolute;
            right: 20px;
            bottom: 20px;
            padding: 8px 15px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            color: white;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            document.body.innerHTML = `<div style="color:red; background:white; padding:20px; border:2px solid red;">
                <h3>JS Error Caught</h3>
                <p>${msg}</p>
                <p>Line: ${lineNo}:${columnNo}</p>
            </div>`;
            return false;
        };
    </script>
    <div class="popup-container">
        <h2 id="message-title">Fokus Reminder</h2>
        <p id="message-content">Preparing your reminder...</p>
        <button id="close-btn" class="close-btn">
            <span id="close-btn-text">Close</span>
        </button>
    </div>
    <script type="module" src="./popup.js"></script>
</body>
</html>
